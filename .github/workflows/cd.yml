name: .NET CD

on:
  push:
    branches: [ "master" ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Build & Push to ACR
      run: |
        az acr login --name inventoryregvb
        docker build -t inventoryregvb.azurecr.io/inventory-api:${{ github.sha }} -t inventoryregvb.azurecr.io/inventory-api:latest -f CloudNativeInventory.Api/Dockerfile .
        docker push inventoryregvb.azurecr.io/inventory-api:latest

    - name: Deploy to Container App
      uses: azure/container-apps-deploy-action@v1
      with:
        acrName: inventoryregvb
        containerAppName: inventory-api
        resourceGroup: CloudNativeRG
        imageToDeploy: inventoryregvb.azurecr.io/inventory-api:latest