name: CloudNative CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  id-token: write
  contents: read

jobs:
  # JOBB 1: Kvalitetskontroll (CI)
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        cache: true
        cache-dependency-path: '**/*.csproj'
        
    - name: Restore & Build
      run: |
        dotnet restore
        dotnet build --configuration Release --no-restore
        
    - name: Run Tests
      run: dotnet test --configuration Release --no-build --verbosity normal

  # JOBB 2: Driftsättning (CD) - Startar bara om testerna går igenom
  deploy:
    needs: [build-and-test]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Build & Push to ACR
      run: |
        az acr login --name inventoryregvb
        docker build -t inventoryregvb.azurecr.io/inventory-api:${{ github.sha }} -t inventoryregvb.azurecr.io/inventory-api:latest -f CloudNativeInventory.Api/Dockerfile .
        docker push inventoryregvb.azurecr.io/inventory-api:latest

    - name: Deploy to Container App
      uses: azure/container-apps-deploy-action@v1
      with:
        acrName: inventoryregvb
        containerAppName: inventory-api
        resourceGroup: CloudNativeRG
        imageToDeploy: inventoryregvb.azurecr.io/inventory-api:latest